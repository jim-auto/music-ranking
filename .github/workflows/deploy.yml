name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  schedule:
    - cron: '0 19 * * *' # 毎日 UTC 19:00 (JST 04:00)
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: Fetch latest rankings
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
        run: node scripts/fetch-rankings.mjs
      - name: Commit updated data
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/rankings.json src/data/history.json
          git diff --cached --quiet || git commit -m "Update rankings data (daily auto-fetch)"
          git push
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: update-and-build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
